<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Lumina Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-body">
    <header class="site-header">
      <div class="shell">
        <nav class="nav">
          <a class="brand" href="./index.html">
            <img class="brand-mark" src="./app-logo.png" alt="Lumina Scan logo" />
            <div class="brand-copy">
              <strong>Lumina Scan</strong>
              <span>Password recovery</span>
            </div>
          </a>
          <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./login.html">Sign In</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="shell auth-page">
      <section class="auth-grid">
        <article class="auth-hero-card">
          <div class="eyebrow">Account Recovery</div>
          <h1>Reset your password from a dedicated recovery page.</h1>
          <p>
            Enter the email address linked to your Lumina Scan account and we will send you a
            secure reset link. Open that link to create a new password on the next screen.
          </p>
        </article>

        <article class="auth-form-card">
          <form id="forgot-password-form" class="auth-form">
            <div class="auth-field">
              <label class="editor-label" for="reset-email">Email Address</label>
              <input id="reset-email" class="editor-input" type="email" placeholder="Enter your account email" required />
            </div>

            <button class="button button-primary auth-submit" id="forgot-password-submit" type="submit">
              Send Reset Link
            </button>
          </form>

          <div class="auth-inline-actions">
            <a class="button button-ghost" href="./login.html">Back to Sign In</a>
          </div>

          <div class="auth-message" id="forgot-password-message" hidden></div>
        </article>
      </section>
    </main>

    <script src="./forgot-password.js"></script>
  </body>
  </html>
