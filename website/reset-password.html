<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Lumina Scan</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-blur: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }

        .blob-1 { top: -100px; left: -100px; }
        .blob-2 { bottom: -100px; right: -100px; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 2rem;
            transition: color 0.2s;
        }

        nav a:hover { color: white; }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 1px solid var(--border);
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
        }

        .auth-header p {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .account-badge {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .account-badge span { font-size: 0.85rem; color: var(--text-dim); }
        .account-badge strong { font-size: 0.9rem; color: white; }

        .input-group { margin-bottom: 1.25rem; }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: var(--text-dim);
            width: 18px;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem 0.75rem 3rem;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        .pw-toggle {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

        #notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(200%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #notification.show { transform: translateY(0); }
        .notif-success { border-color: rgba(34, 197, 94, 0.5); color: #86efac; }
        .notif-error { border-color: rgba(239, 68, 68, 0.5); color: #fca5a5; }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header>
        <a href="./index.html" class="logo">
            <img src="./app-logo.png" alt="Lumina Scan">
            <span>Lumina Scan</span>
        </a>
        <nav>
            <a href="./index.html">Home</a>
            <a href="./login.html">Sign In</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="icon-box"><i data-lucide="shield-check" size="32"></i></div>
                <h1>Change Password</h1>
                <p>Create a secure new password for your account.</p>
            </div>

            <div class="account-badge">
                <span>Account</span>
                <strong id="reset-email-value">Loading...</strong>
            </div>

            <form id="reset-password-form">
                <div class="input-group">
                    <label for="new-password">New Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="new-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span>Update Password</span>
                    <i data-lucide="check-circle"></i>
                </button>
            </form>
        </div>
    </main>

    <div id="notification">
        <i data-lucide="info"></i>
        <span id="notif-text"></span>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="submit-btn" style="width: auto; padding: 1rem 2rem;">
            <i data-lucide="loader-2" class="animate-spin"></i>
            Updating...
        </div>
    </div>

    <script src="./app-config.js"></script>
    <script src="./supabase.js"></script>
    <script src="./reset-password.js"></script>
    <script>
        lucide.createIcons();
        // reset-password.js will handle the logic. 
        // We'll update it to use the new UI components.
    </script>
</body>
</html>
