<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Lumina Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-body">
    <header class="site-header">
      <div class="shell">
        <nav class="nav">
          <a class="brand" href="./index.html">
            <img class="brand-mark" src="./app-logo.png" alt="Lumina Scan logo" />
            <div class="brand-copy">
              <strong>Lumina Scan</strong>
              <span>Change password</span>
            </div>
          </a>
          <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./login.html">Sign In</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="shell auth-page">
      <section class="reset-layout">
        <div class="reset-side-label">Email Address</div>
        <div class="reset-main-panel">
          <div class="reset-top-row">
            <strong class="reset-email-value" id="reset-email-value">Loading account...</strong>
            <a class="button button-secondary reset-change-email" href="./forgot-password.html">Change email</a>
          </div>

          <form id="reset-password-form" class="reset-password-form">
            <div class="reset-field-block">
              <label class="editor-label reset-label" for="new-password">New Password</label>
              <input id="new-password" class="editor-input reset-input" type="password" placeholder="Enter your new password" />
              <p class="reset-helper">Password must contain at least 8 characters</p>
            </div>

            <div class="reset-field-block">
              <label class="editor-label reset-label" for="confirm-password">Re-type New Password</label>
              <input id="confirm-password" class="editor-input reset-input" type="password" placeholder="Re-enter your new password" />
            </div>

            <button class="button button-primary reset-submit" id="reset-password-submit" type="submit">
              Change password
            </button>
          </form>

          <div class="auth-message" id="reset-password-message" hidden></div>
        </div>
      </section>
    </main>

    <script src="./app-config.js"></script>
    <script src="./supabase.js"></script>
    <script src="./reset-password.js"></script>
  </body>
  </html>
